import React, { createContext, useContext, useState, useEffect } from 'react';

interface LayerSettings {
  fontSize?: number;
  iconSize?: number;
  showIcons?: boolean;
  showText?: boolean;
}

interface SettingsContextType {
  fontSize: number;
  iconSize: number;
  showIcons: boolean;
  showText: boolean;
  motherHostingFontSize: number;
  motherHostingIconSize: number;
  motherHostingShowIcons: boolean;
  motherHostingShowText: boolean;
  setMotherHostingFontSize: (size: number | ((prev: number) =&gt; number)) =&gt; void;
  setMotherHostingIconSize: (size: number | ((prev: number) =&gt; number)) =&gt; void;
  setMotherHostingShowIcons: (show: boolean | ((prev: boolean) =&gt; boolean)) =&gt; void;
  setMotherHostingShowText: (show: boolean | ((prev: boolean) =&gt; boolean)) =&gt; void;
  configMode: 'none' | 'text' | 'icons' | 'menu';
  isHostingVisible: boolean;
  layerSettings: Record&lt;string, LayerSettings&gt;;
  setFontSize: (size: number | ((prev: number) =&gt; number)) =&gt; void;
  setIconSize: (size: number | ((prev: number) =&gt; number)) =&gt; void;
  setShowIcons: (show: boolean | ((prev: boolean) =&gt; boolean)) =&gt; void;
  setShowText: (show: boolean | ((prev: boolean) =&gt; boolean)) =&gt; void;
  setConfigMode: (mode: 'none' | 'text' | 'icons' | 'menu') =&gt; void;
  setIsHostingVisible: (visible: boolean | ((prev: boolean) =&gt; boolean)) =&gt; void;
  setLayerSetting: (layerId: string, setting: keyof LayerSettings, value: any) =&gt; void;
  resetLayerSettings: (layerId: string) =&gt; void;
  getLayerSettings: (layerId: string) =&gt; LayerSettings;
}

const SettingsContext = createContext&lt;SettingsContextType | undefined&gt;(undefined);

export function SettingsProvider({ children }: { children: React.ReactNode }) {
  // Load initial values from localStorage or use defaults
  const [fontSize, setFontSize] = useState(() =&gt; {
    const saved = localStorage.getItem('teso_fontSize_v2');
    return saved ? parseInt(saved, 10) : 10;
  });
  
  const [iconSize, setIconSize] = useState(() =&gt; {
    const saved = localStorage.getItem('teso_iconSize_v2');
    return saved ? parseInt(saved, 10) : 55;
  });
  
  const [showIcons, setShowIcons] = useState(() =&gt; {
    const saved = localStorage.getItem('teso_showIcons_v2');
    return saved !== null ? saved === 'true' : true;
  });
  
  const [showText, setShowText] = useState(() =&gt; {
    const saved = localStorage.getItem('teso_showText_v2');
    return saved !== null ? saved === 'true' : true;
  });

  const [motherHostingFontSize, setMotherHostingFontSize] = useState(() =&gt; {
    const saved = localStorage.getItem('teso_motherHostingFontSize');
    return saved ? parseInt(saved, 10) : 10;
  });
  
  const [motherHostingIconSize, setMotherHostingIconSize] = useState(() =&gt; {
    const saved = localStorage.getItem('teso_motherHostingIconSize');
    return saved ? parseInt(saved, 10) : 55;
  });
  
  const [motherHostingShowIcons, setMotherHostingShowIcons] = useState(() =&gt; {
    const saved = localStorage.getItem('teso_motherHostingShowIcons');
    return saved !== null ? saved === 'true' : true;
  });
  
  const [motherHostingShowText, setMotherHostingShowText] = useState(() =&gt; {
    const saved = localStorage.getItem('teso_motherHostingShowText');
    return saved !== null ? saved === 'true' : true;
  });

  const [configMode, setConfigMode] = useState&lt;'none' | 'text' | 'icons' | 'menu'&gt;('none');
  const [isHostingVisible, setIsHostingVisible] = useState(true);

  const [layerSettings, setLayerSettings] = useState&lt;Record&lt;string, LayerSettings&gt;&gt;(() =&gt; {
    const saved = localStorage.getItem('teso_layerSettings_v2');
    return saved ? JSON.parse(saved) : {};
  });

  // Save to localStorage whenever values change
  useEffect(() =&gt; {
    localStorage.setItem('teso_fontSize_v2', fontSize.toString());
  }, [fontSize]);

  useEffect(() =&gt; {
    localStorage.setItem('teso_iconSize_v2', iconSize.toString());
  }, [iconSize]);

  useEffect(() =&gt; {
    localStorage.setItem('teso_showIcons_v2', showIcons.toString());
  }, [showIcons]);

  useEffect(() =&gt; {
    localStorage.setItem('teso_showText_v2', showText.toString());
  }, [showText]);

  useEffect(() =&gt; {
    localStorage.setItem('teso_motherHostingFontSize', motherHostingFontSize.toString());
  }, [motherHostingFontSize]);

  useEffect(() =&gt; {
    localStorage.setItem('teso_motherHostingIconSize', motherHostingIconSize.toString());
  }, [motherHostingIconSize]);

  useEffect(() =&gt; {
    localStorage.setItem('teso_motherHostingShowIcons', motherHostingShowIcons.toString());
  }, [motherHostingShowIcons]);

  useEffect(() =&gt; {
    localStorage.setItem('teso_motherHostingShowText', motherHostingShowText.toString());
  }, [motherHostingShowText]);

  useEffect(() =&gt; {
    localStorage.setItem('teso_layerSettings_v2', JSON.stringify(layerSettings));
  }, [layerSettings]);

  const setLayerSetting = (layerId: string, setting: keyof LayerSettings, value: any) =&gt; {
    setLayerSettings(prev =&gt; ({
      ...prev,
      [layerId]: {
        ...prev[layerId],
        [setting]: value
      }
    }));
  };

  const resetLayerSettings = (layerId: string) =&gt; {
    setLayerSettings(prev =&gt; {
      const next = { ...prev };
      delete next[layerId];
      return next;
    });
  };

  const getLayerSettings = (layerId: string) =&gt; {
    return layerSettings[layerId] || {};
  };

  return (
    &lt;SettingsContext.Provider value={{
      motherHostingFontSize,
      motherHostingIconSize,
      motherHostingShowIcons,
      motherHostingShowText,
      setMotherHostingFontSize,
      setMotherHostingIconSize,
      setMotherHostingShowIcons,
      setMotherHostingShowText,
      fontSize,
      iconSize,
      showIcons,
      showText,
      configMode,
      isHostingVisible,
      layerSettings,
      setFontSize,
      setIconSize,
      setShowIcons,
      setShowText,
      setConfigMode,
      setIsHostingVisible,
      setLayerSetting,
      resetLayerSettings,
      getLayerSettings
    }}&gt;
      {children}
    &lt;/SettingsContext.Provider&gt;
  );
}

export function useSettings() {
  const context = useContext(SettingsContext);
  if (context === undefined) {
    throw new Error('useSettings must be used within a SettingsProvider');
  }
  return context;
}

import { useSettings } from '../contexts/SettingsContext';
import { useLayerId } from '../contexts/LayerContext';

interface TesoButtonProps {
  key?: React.Key;
  id?: number;
  label: string;
  icon?: React.ReactNode;
  image?: string;
  color?: string;
  onClick?: () =&gt; void;
  className?: string;
  showId?: boolean;
  layerId?: string;
  centerContent?: boolean;
  fontSize?: number;
  iconSize?: number;
  showIcons?: boolean;
  showText?: boolean;
}

export default function TesoButton({ 
  id, 
  label, 
  icon, 
  image, 
  color, 
  onClick, 
  className, 
  showId = true, 
  layerId, 
  centerContent = false,
  fontSize: overrideFontSize,
  iconSize: overrideIconSize,
  showIcons: overrideShowIcons,
  showText: overrideShowText
}: TesoButtonProps) {
  const contextLayerId = useLayerId();
  const effectiveLayerId = layerId || contextLayerId;
  const { fontSize: globalFontSize, iconSize: globalIconSize, showIcons: globalShowIcons, showText: globalShowText, getLayerSettings } = useSettings();

  const layerSettings = effectiveLayerId ? getLayerSettings(effectiveLayerId) : {};
  
  const fontSize = overrideFontSize ?? (layerSettings.fontSize ?? globalFontSize);
  const iconSize = overrideIconSize ?? (layerSettings.iconSize ?? globalIconSize);
  const showIcons = overrideShowIcons ?? (layerSettings.showIcons ?? globalShowIcons);
  const showText = overrideShowText ?? (layerSettings.showText ?? globalShowText);

  const isBlackText = id !== undefined &amp;&amp; id &lt; 5;

  return (
    &lt;motion.button
      id={id !== undefined ? `teso-button-${id}` : undefined}
      whileTap={{ scale: 0.95 }}
      onClick={onClick}
      className={`
        ${color || 'bg-white/5'} 
        aspect-square rounded-2xl flex flex-col items-center p-3 shadow-lg 
        transition-shadow hover:shadow-white/5 relative overflow-hidden group
        ${centerContent ? 'justify-center' : 'justify-between'}
        ${className || ''}
      `}
    &gt;
      {showId &amp;&amp; id !== undefined &amp;&amp; (
        &lt;span className={`${centerContent ? 'absolute top-3 left-3' : 'self-start'} text-lg font-black leading-none ${isBlackText ? 'text-black/60' : 'text-white/60'}`}&gt;{id}&lt;/span&gt;
      )}
      
      {(!centerContent || (showIcons &amp;&amp; (icon || image))) &amp;&amp; (
        &lt;div className={`${centerContent ? '' : 'flex-1'} flex items-center justify-center w-full ${centerContent ? 'mb-2' : '-mt-2'} drop-shadow-md`}&gt;
          {showIcons &amp;&amp; (
            &lt;&gt;
              {icon &amp;&amp; (
                &lt;div 
                  style={{ width: iconSize, height: iconSize }} 
                  className={`flex items-center justify-center ${isBlackText ? 'text-black' : 'text-white'}`}
                &gt;
                  {React.isValidElement(icon) 
                    ? React.cloneElement(icon as React.ReactElement&lt;any&gt;, { 
                        className: `${(icon as React.ReactElement&lt;any&gt;).props.className || ''} w-full h-full`.replace(/w-\d+|h-\d+|sm:w-\d+|sm:h-\d+/g, '').trim() 
                      }) 
                    : icon}
                &lt;/div&gt;
              )}
              {image &amp;&amp; (
                &lt;img 
                  src={image} 
                  alt={label} 
                  style={{ width: iconSize, height: iconSize }} 
                  className={`object-contain ${isBlackText ? 'brightness-0' : ''}`}
                  referrerPolicy="no-referrer"
                /&gt;
              )}
            &lt;/&gt;
          )}
        &lt;/div&gt;
      )}

      {showText &amp;&amp; (
        &lt;span 
          style={{ fontSize: fontSize }}
          className={`max-w-[85%] w-full flex items-center justify-center text-center break-normal whitespace-normal overflow-hidden line-clamp-2 font-black uppercase tracking-tighter leading-[1.1] ${centerContent ? '' : 'mb-1'} drop-shadow-sm ${isBlackText ? 'text-black' : 'text-white'}`}
        &gt;
          {label}
        &lt;/span&gt;
      )}
      &lt;div className="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent pointer-events-none opacity-40" /&gt;
    &lt;/motion.button&gt;
  );
}

import { TESO_COLORS } from '../constants';
import { useSettings } from '../contexts/SettingsContext';

interface TengoPageProps {

  onGoLanding: () =&gt; void;

  onOpenConfiguracion?: () =&gt; void;
}

export default function TengoPage({ onBack, onGoLanding, onOpenIA, onOpenConfiguracion }: TengoPageProps) {
  const { getLayerSettings, fontSize: globalFontSize, iconSize: globalIconSize, isHostingVisible } = useSettings();
  const [currentLayer, setCurrentLayer] = useState&lt;string[]&gt;([]);
  const [feedbackType, setFeedbackType] = useState&lt;'none' | 'forward' | 'back' | 'confirm'&gt;('none');
  
  const triggerFeedback = (type: 'forward' | 'back' | 'confirm') =&gt; {
    setFeedbackType(type);
    setTimeout(() =&gt; setFeedbackType('none'), 300);
    if (window.navigator.vibrate) {
      window.navigator.vibrate(type === 'forward' ? 10 : type === 'back' ? 5 : 15);
    }
  };

  const layerId = 'tengo';
  const layerSettings = getLayerSettings(layerId);
  const currentFontSize = layerSettings.fontSize ?? globalFontSize;
  const currentIconSize = layerSettings.iconSize ?? globalIconSize;

  const getPathInfo = () =&gt; {
    const info: { title: string; path: string[] }[] = [{ title: 'TENGO', path: [] }];
    let current: any = TESO_DEMO;
    let path: string[] = [];
    for (const key of currentLayer) {
      path = [...path, key];
      const item = current[key];
      if (item) {
        info.push({ title: item.title || item, path: [...path] });
        current = item.children || item;
      }
    }
    return info.slice(0, 6);
  };

  const getCurrentData = () =&gt; {
    let current: any = TESO_DEMO;
    for (const key of currentLayer) {
      current = current.children ? current.children[key] : current[key];
    }
    return current;
  };

  const currentData = getCurrentData();
  const buttons = currentData.children
    ? Object.entries(currentData.children).map(([key, value]: [string, any]) =&gt; ({
        id: key,
        label: value.title || value,
        hasChildren: !!value.children,
      }))
    : Object.entries(currentData).map(([key, value]: [string, any]) =&gt; ({
        id: key,
        label: value.title || value,
        hasChildren: !!value.children,
      }));

  const handleButtonClick = (id: string) =&gt; {
    const clickedItem = buttons.find((b) =&gt; b.id === id);
    if (clickedItem?.hasChildren) {
      triggerFeedback('forward');
      setCurrentLayer([...currentLayer, id]);
    }
  };

  const handleBack = () =&gt; {
    if (currentLayer.length &gt; 0) {
      triggerFeedback('back');
      setCurrentLayer(currentLayer.slice(0, -1));
    } else {
      onBack();
    }
  };

  };

      &lt;motion.div

            : feedbackType === 'back'
            ? { scale: [1, 0.98, 1], x: [0, -2, 0] }

                return (
                  &lt;React.Fragment key={index}&gt;
                    &lt;motion.button
                      whileHover={{ scale: 1.05 }}
                      whileTap={{ scale: 0.95 }}
                      onClick={() =&gt; handleNavigate(item.path)}
                      className={`px-2 py-0.5 rounded text-[10px] font-black tracking-widest uppercase transition-colors ${
                        isLast ? 'bg-yellow-500 text-black' : 'bg-white text-black hover:bg-gray-200'
                      }`}
                    &gt;
                      {item.title}
                    &lt;/motion.button&gt;
                    {!isLast &amp;&amp; &lt;span className="text-white/50 font-bold"&gt;&amp;gt;&lt;/span&gt;}
                  &lt;/React.Fragment&gt;
                );
              })}
            &lt;/motion.div&gt;
          &lt;/div&gt;
        &lt;/header&gt;

        &lt;main className={`grid grid-cols-3 gap-3 sm:gap-4 transition-all duration-500 ${isHostingVisible ? '' : 'scale-110'}`}&gt;
          {buttons.map((btn, index) =&gt; (
            &lt;TesoButton
              key={btn.id}
              id={index + 1}
              label={btn.label}
              icon={null}
              color={TESO_COLORS[(index + 1) as keyof typeof TESO_COLORS]}
              fontSize={currentFontSize}
              iconSize={currentIconSize}
              onClick={() =&gt; handleButtonClick(btn.id)}
              centerContent={true}
            /&gt;
          ))}
        &lt;/main&gt;

        &lt;TesoHosting
          layerId={layerId}
          onBack={handleBack}
          onGoLanding={onGoLanding}
          onOpenIA={onOpenIA}
          onOpenConfiguracion={onOpenConfiguracion}
          breadcrumbItems={getPathInfo()}
          onNavigate={handleNavigate}
        &gt;
          {buttons.map((btn, index) =&gt; (

              key={`${btn.id}-${index}`}
              whileTap={{ scale: 0.9 }}
              onClick={() =&gt; handleButtonClick(btn.id)}
              className={`${TESO_COLORS[(index + 1) as keyof typeof TESO_COLORS]} w-14 h-14 rounded-lg flex items-center justify-center text-xl font-black border border-white/5 shadow-sm`}
            &gt;
              &lt;span style={{ fontSize: '16px' }}&gt;{index + 1}&lt;/span&gt;
            &lt;/motion.button&gt;
          ))}
        &lt;/TesoHosting&gt;
      &lt;/motion.div&gt;
    &lt;/div&gt;
  );
}

import React, { useState, useEffect, useRef, memo, useCallback } from 'react';
import { motion } from 'motion/react';
import { ArrowLeft, Map as MapIcon, Info, ZoomIn, ZoomOut } from 'lucide-react';
import { TransformWrapper, TransformComponent, useControls } from 'react-zoom-pan-pinch';
import { HostingButtons } from './TesoUniversalList';
import { useSettings } from '../contexts/SettingsContext';

interface PlanoEmpresaPageProps {
  onBack: () =&gt; void;
  onGoLanding: () =&gt; void;
  onOpenIA: () =&gt; void;
  onOpenConfiguracion?: () =&gt; void;
}

type OverlayType = 'trackpad' | 'none' | 'filters' | 'actions' | 'modes' | 'actions_enviar' | 'tools' | 'tools_velocidad' | 'tools_velocidad_listado' | 'tools_velocidad_hosting' | 'tools_tamano' | 'tools_tamano_letra' | 'tools_tamano_hosting' | 'tools_tamano_iconos';

// ── Pulsor ──────────────────────────────────────────────────────────────────
const Pulsor = ({ onDoubleTap }: { onDoubleTap?: () =&gt; void }) =&gt; {
  const lastTapRef = React.useRef(0);

  const handlePointerUp = (e: React.PointerEvent) =&gt; {
    const now = Date.now();
    if (now - lastTapRef.current &lt; 350) {
      lastTapRef.current = 0;
      onDoubleTap?.();
      if (window.navigator.vibrate) window.navigator.vibrate([30, 20, 60]);
    } else {
      lastTapRef.current = now;
      const overlay = e.currentTarget as HTMLElement;
      overlay.style.visibility = 'hidden';
      const below = document.elementFromPoint(e.clientX, e.clientY);
      overlay.style.visibility = '';
      if (below) (below as HTMLElement).click?.();
    }
  };

  return (
    &lt;div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-40 flex items-center justify-center drop-shadow-[0_0_8px_rgba(0,0,0,1)]"&gt;
      &lt;div className="pointer-events-none w-8 h-8 rounded-full border-[2px] border-[#FFD700] shadow-[0_0_16px_rgba(255,215,0,0.8),inset_0_0_10px_rgba(255,215,0,0.5)] flex items-center justify-center bg-transparent relative"&gt;
        &lt;div className="absolute inset-[-4px] rounded-full border-[1.5px] border-dashed border-[#FFD700] animate-[spin_6s_linear_infinite]" /&gt;
        &lt;div className="absolute inset-[3px] rounded-full border-[1.5px] border-[#FFD700] animate-[spin_4s_linear_infinite_reverse]" style={{ borderTopColor: 'transparent' }} /&gt;
        &lt;div className="w-1.5 h-1.5 rounded-full bg-[#FFD700] shadow-[0_0_10px_rgba(255,215,0,1)]" /&gt;
      &lt;/div&gt;
      {onDoubleTap &amp;&amp; (
        &lt;div
          className="absolute w-16 h-16 rounded-full"
          style={{ pointerEvents: 'auto', touchAction: 'none' }}
          onPointerUp={handlePointerUp}
        /&gt;
      )}
    &lt;/div&gt;
  );
};

// ── Pan bounds helper — corner of map stops at pulsor (screen center) ────────
const calcBounds = (
  px: number, py: number, scale: number,
  wrapper: HTMLDivElement | null, content: HTMLDivElement | null
) =&gt; {
  if (!wrapper || !content) return { x: px, y: py };
  const wW = wrapper.offsetWidth;
  const wH = wrapper.offsetHeight;
  const cW = content.offsetWidth * scale;
  const cH = content.offsetHeight * scale;
  return {
    x: Math.max(wW / 2 - cW, Math.min(wW / 2, px)),
    y: Math.max(wH / 2 - cH, Math.min(wH / 2, py)),
  };
};

// ── Pan Controller — conecta joystick con TransformWrapper ──────────────────
const MapPanController = memo(({ panRef, clampRef, stateRef, zoomRef }: {
  panRef: React.MutableRefObject&lt;(dx: number, dy: number) =&gt; void&gt;;
  clampRef: React.MutableRefObject&lt;() =&gt; void&gt;;
  stateRef?: React.MutableRefObject&lt;() =&gt; { positionX: number; positionY: number; scale: number }&gt;;
  zoomRef?: React.MutableRefObject&lt;(delta: number) =&gt; void&gt;;
}) =&gt; {
  const { setTransform, instance } = useControls();
  useEffect(() =&gt; {
    panRef.current = (dx: number, dy: number) =&gt; {
      const { positionX, positionY, scale } = instance.transformState;
      const { x, y } = calcBounds(positionX + dx * 2.5, positionY + dy * 2.5, scale, instance.wrapperComponent, instance.contentComponent);
      setTransform(x, y, scale, 0);
    };
    clampRef.current = () =&gt; {
      const { positionX, positionY, scale } = instance.transformState;
      const { x, y } = calcBounds(positionX, positionY, scale, instance.wrapperComponent, instance.contentComponent);
      if (x !== positionX || y !== positionY) setTransform(x, y, scale, 200);
    };
    if (stateRef) stateRef.current = () =&gt; instance.transformState;
    if (zoomRef) {
      zoomRef.current = (delta: number) =&gt; {
        const { positionX, positionY, scale } = instance.transformState;
        const wrapper = instance.wrapperComponent;
        if (!wrapper) return;
        const rect = wrapper.getBoundingClientRect();
        const lx = window.innerWidth / 2 - rect.left;
        const ly = window.innerHeight / 2 - rect.top;
        const minScale = 0.3;
        const maxScale = 8;
        const newScale = Math.max(minScale, Math.min(maxScale, scale * (1 + delta)));
        const ratio = newScale / scale;
        const newX = lx - (lx - positionX) * ratio;
        const newY = ly - (ly - positionY) * ratio;
        const { x, y } = calcBounds(newX, newY, newScale, wrapper, instance.contentComponent);
        setTransform(x, y, newScale, 80);
      };
    }
  });
  return null;
});

  useEffect(() =&gt; { localStorage.setItem('teso_iconSizeLevel', iconSizeLevel.toString()); }, [iconSizeLevel]);

  const zones = [
    { id: 'acceso', label: 'ACCESO', x: 50, y: 500, w: 100, h: 60, color: 'bg-blue-500/20' },
    { id: 'oficinas', label: 'OFICINAS', x: 50, y: 300, w: 200, h: 180, color: 'bg-indigo-500/20' },
    { id: 'produccion', label: 'PRODUCCIÓN', x: 270, y: 100, w: 400, h: 300, color: 'bg-red-500/20' },

    if (!mapContainerRef.current) return;
    const { positionX, positionY, scale } = mapStateRef.current();
    const rect = mapContainerRef.current.getBoundingClientRect();
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const contentX = (cx - rect.left - positionX) / scale;
    const contentY = (cy - rect.top - positionY) / scale;
    const W = rect.width;
    const H = rect.height;
    for (const zone of zones) {
      if ((zone as any).isBackground) continue;
      const l = (zone.x / 800) * W;
      const t = (zone.y / 600) * H;
      const r = ((zone.x + zone.w) / 800) * W;
      const b = ((zone.y + zone.h) / 600) * H;

function ConstructorManager({ children }: { children: React.ReactNode }) {
  const { openConstructor } = useConstructor();

  (window as any).abrir_constructor_actual = () =&gt; {

      pantalla: layerId,

    };
    openConstructor(context);
    console.log('Constructor abierto:', context);
  };

  (window as any).duplicar_elemento = (elementId: string) =&gt; {
    const element = document.getElementById(`teso-button-${elementId}`);
    if (!element) {
      console.error(`Elemento teso-button-${elementId} no encontrado`);
      return;
    }
    const clone = element.cloneNode(true) as HTMLElement;
    clone.id = `teso-button-${elementId}_clone_${Date.now()}`;
    clone.style.marginLeft = '10px';
    element.parentNode?.insertBefore(clone, element);

  };

  return &lt;&gt;{children}&lt;/&gt;;
}

<script>
var copyIcon = '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10"/></svg> COPIAR TODO';
var checkIcon = '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> COPIADO ✓';
function copyAll() {
  var ta = document.getElementById('codeArea');
  ta.select();
  ta.setSelectionRange(0, ta.value.length);
  var btn = document.getElementById('copyBtn');
  function markDone() {
    btn.classList.add('copied');
    btn.innerHTML = checkIcon;
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.innerHTML = copyIcon;
    }, 3000);
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(ta.value).then(markDone).catch(function() {
      document.execCommand('copy'); markDone();
    });
  } else {
    document.execCommand('copy'); markDone();
  }
}
</script>
